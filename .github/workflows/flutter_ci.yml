name: Nature Daily CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verificar versão do Flutter
        run: flutter --version

      - name: Instalar dependências
        run: flutter pub get

      - name: Checar formatação do código (apenas informativo, não bloqueia)
        run: dart format --output=none .
        continue-on-error: true

      - name: Analisar código (lints/erros estáticos)
        run: flutter analyze

      - name: Rodar testes unitários
        run: flutter test --coverage

      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
